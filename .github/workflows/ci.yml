name: MoodSync CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────
  # Backend — Import & Syntax Check (no DB required)
  # ──────────────────────────────────────────────────
  backend:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_ENV=test
          DEBUG=false
          SECRET_KEY=test-secret-key-minimum-32-characters-long-for-jwt
          DATABASE_URL=postgresql+asyncpg://moodsync:testpassword@localhost:5432/moodsync_test
          SPOTIFY_CLIENT_ID=
          SPOTIFY_CLIENT_SECRET=
          ALLOWED_ORIGINS=http://localhost:5173
          EOF

      - name: Check Python syntax (py_compile)
        run: |
          python -m py_compile app/config.py
          python -m py_compile app/database.py
          python -m py_compile app/main.py
          echo "Syntax check passed"

      - name: Verify ML engine (no DB needed)
        run: |
          python -c "
          from app.ml.mood_classifier import mood_classifier
          r = mood_classifier.classify(3, 9, 3, 2, 4, 8, 3)
          print(f'Mood classifier OK: {r.primary_mood}')

          from app.ml.context_fusion import context_fusion_engine
          p = context_fusion_engine.build_music_profile('stressed', 'studying', 'improve_focus')
          print(f'Context fusion OK: genres={p.seed_genres[:2]}')
          print('All ML checks passed')
          "

      - name: Verify app imports (graceful DB failure expected)
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from app.config import settings
          from app.api.v1.router import api_router
          from fastapi import FastAPI
          app = FastAPI()
          app.include_router(api_router, prefix='/api/v1')
          routes = [r.path for r in app.routes]
          print(f'Routes loaded: {len(routes)}')
          assert len(routes) >= 20, f'Expected 20+ routes, got {len(routes)}'
          print('App import check passed')
          "

  # ──────────────────────────────────────────────────
  # Frontend Build
  # ──────────────────────────────────────────────────
  frontend:
    name: Frontend — Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7


