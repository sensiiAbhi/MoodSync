name: MoodSync CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────
  # Backend Tests & Linting
  # ──────────────────────────────────────────────────
  backend:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moodsync_test
          POSTGRES_USER: moodsync
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << EOF
          APP_ENV=test
          SECRET_KEY=test-secret-key-minimum-32-characters-long-for-jwt
          DATABASE_URL=postgresql+asyncpg://moodsync:testpassword@localhost:5432/moodsync_test
          SPOTIFY_CLIENT_ID=
          SPOTIFY_CLIENT_SECRET=
          ALLOWED_ORIGINS=http://localhost:5173
          EOF

      - name: Run linting (ruff)
        run: |
          pip install ruff
          ruff check app/ --ignore E501

      - name: Run backend import check
        run: |
          python -c "from app.main import app; print('✓ App imports OK')"

  # ──────────────────────────────────────────────────
  # Frontend Build
  # ──────────────────────────────────────────────────
  frontend:
    name: Frontend — Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────
  # Docker Build Verification
  # ──────────────────────────────────────────────────
  docker:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t moodsync-backend:ci ./backend

  # ──────────────────────────────────────────────────
  # Deploy Frontend to Firebase Hosting (main branch)
  # ──────────────────────────────────────────────────
  deploy-firebase:
    name: Deploy → Firebase Hosting
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline || npm install

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: moodsync-app

