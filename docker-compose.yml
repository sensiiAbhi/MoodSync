version: '3.9'

services:
  # ──────────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: moodsync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moodsync}
      POSTGRES_USER: ${POSTGRES_USER:-moodsync_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moodsync_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moodsync_user} -d ${POSTGRES_DB:-moodsync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # Redis Cache
  # ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: moodsync_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # FastAPI Backend
  # ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moodsync_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-moodsync_user}:${POSTGRES_PASSWORD:-moodsync_secret}@postgres:5432/${POSTGRES_DB:-moodsync}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────────
  # React Frontend (Development)
  # ──────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: moodsync_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
